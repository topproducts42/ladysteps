n": "iPad พร้อมชิป A16 ที่เร็วสุดแรงช่วยให้คุณใช้งานแอปสำคัญๆ และทำงานมัลติทาสก์ได้สบายๆ เรียกได้ว่าทั้งครบเครื่อง ทั้งสนุก และพร้อมเสมอไม่ว่าจะโปรเจ็กต์ไหนๆ ขณะที่จอภาพ Liquid Retina ขนาด 11 นิ้ว ที่เต็มอิ่มสมจริงในดีไซน์แบบหน้าจอทั้งหมดก็ช่วยให้การสร้างสรรค์และทำงานร่วมกันเป็นเรื่องง่าย1 และยังสามารถทำงานอย่างมีประสิทธิภาพได้เสมอไม่ว่าจะอยู่ที่ไหนด้วย Wi-Fi 6 และ 5G2 และทั้งหมดนี้มาในราคาที่คุ้มค่ากว่าเดิม\n\n•\tจอภาพ LIQUID RETINA ขนาด 11 นิ้ว—จอภาพ Liquid Retina ที่สวยสดงดงามคือวิธีที่ยอดเยี่ยมในการดูภาพยนตร์ หรือวาดผลงานชิ้นเอกชิ้นต่อไปของคุณ1 โดย True Tone จะคอยปรับจอภาพให้เหมาะกับอุณหภูมิสีของห้องเพื่อการดูที่สบายตาในทุกสภาพแสง \n\t•\tประสิทธิภาพและพื้นที่จัดเก็บข้อมูล—ชิป A16 ที่เร็วสุดแรงมาพร้อมประสิทธิภาพที่สูงขึ้นสำหรับกิจกรรมโปรดของคุณ และด้วยแบตเตอรี่ที่ใช้งานได้ตลอดวัน iPad จึงเหมาะสุดๆ สำหรับการเล่นเกมที่เต็มอิ่มสมจริง รวมถึงการตัดต่อรูปภาพและวิดีโอ3 ส่วนพื้นที่จัดเก็บข้อมูลก็เริ่มต้นที่ 128GB ไปจนถึงสูงสุดที่ 512GB4\n\t•\tIPADOS + แอป—iPadOS ทำให้ iPad ทั้งมีประสิทธิภาพ ใช้งานง่าย และอเนกประสงค์มากขึ้น โดย iPadOS ช่วยให้คุณใช้งานหลายแอปได้พร้อมกัน ใช้ Apple Pencil เขียนลงในช่องข้อความใดก็ได้ด้วยคุณสมบัติการเขียนข้อความ และยังสามารถแก้ไขและแชร์รูปภาพได้ ยิ่งไปกว่านั้น iPad ยังมาพร้อมแอปที่จำเป็นอย่าง Safari, ข้อความ และ Keynote แถมยังมีอีกเกินล้านแอปที่ออกแบบมาโดยเฉพาะสำหรับ iPad ใน App Store อีกด้วย\n\t•\tAPPLE PENCIL และ  MAGIC KEYBOARD FOLIO—Apple Pencil (USB-C) พลิกโฉม iPad ให้กลายเป็นผืนผ้าใบที่สมจริงสำหรับการวาดภาพและเป็นอุปกรณ์สำหรับจดโน้ต ส่วน Magic Keyboard Folio ก็มาในดีไซน์แบบสองชิ้นสุดอเนกประสงค์ที่ประกอบด้วยคีย์บอร์ดแบบถอดแยกได้และแผงปกป้องที่ด้านหลังตัวเครื่อง โดยทั้งคู่จะยึดติดกับ iPad ด้วยแม่เหล็ก โดย Apple Pencil (รุ่นที่ 1) นั้นสามารถใช้งานร่วมกับ iPad ได้5 \n\t•\tกล้องที่ล้ำหน้า—iPad มาพร้อมกล้องหน้า 12MP Center Stage ที่เหมาะสุดๆ สำหรับการวิดีโอคอลหรือการถ่ายเซลฟี่ ขณะที่กล้องหลังไวด์ 12MP พร้อมแฟลช True Tone ก็เหมาะอย่างยิ่งสำหรับการสแกนเอกสาร ถ่ายภาพ และบันทึกวิดีโอระดับ 4K\n\t•\tการเชื่อมต่อ WIFI ที่รวดเร็ว—Wi-Fi 6 ให้คุณเชื่อมต     products.forEach((p, index) => {

    function renderProducts(items) {
        const container = document.getElementById('productList');
        const noResults = document.getElementById('noResults');
        const statsText = document.getElementById('statsText');
        container.innerHTML = '';
        if (items.length === 0) {
            noResults.style.display = 'block';
            statsText.innerText = 'พบสินค้า 0 รายการ';
            return;
        }
        noResults.style.display = 'none';
        statsText.innerText = '✨ เจอดีลทั้งหมด ' + items.length + ' รายการ พร้อมเสิร์ฟ!';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            // 1. เพิ่มกล่องเลขลำดับสินค้าอันเด่นชัด
            const badge = document.createElement('div');
            badge.className = 'product-badge';
            badge.innerText = '#' + item.originalIndex;
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'product-img-wrapper';
            const img = document.createElement('img');
            img.className = 'product-img';
            img.src = item.image;
            img.loading = 'lazy';
            img.onerror = function() { this.src = 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200'; };
            imgWrapper.appendChild(img);
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';
            const titleDiv = document.createElement('div');
            titleDiv.className = 'product-title';
            titleDiv.innerText = item.title;
            const descDiv = document.createElement('div');
            descDiv.className = 'product-desc';
            descDiv.innerText = item.description;
            const metaDiv = document.createElement('div');
            metaDiv.className = 'product-meta';
            metaDiv.innerText = 'หมวดหมู่: ' + item.category;
            
            infoDiv.appendChild(titleDiv);
            infoDiv.appendChild(descDiv);
            infoDiv.appendChild(metaDiv);
            
            const btnLink = document.createElement('a');
            btnLink.className = 'btn-shop';
            btnLink.href = item.link;
            btnLink.target = '_blank';
            btnLink.innerText = 'ไปที่ร้านค้า 🛍️';
            
            // เรียงลำดับส่วนประกอบใหม่เข้าการ์ด
            card.appendChild(badge);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            card.appendChild(btnLink);
            container.appendChild(card);
        });
    }
