ยเข้ากับแนวคิดการบำบัดด้วยกลิ่นหอม (Aromatherapy) โดยใช้ส่วนผสมจากสมุนไพรไทยคุณภาพ 5 ชนิด ได้แก่ พิมเสน การบูร เกล็ดสะระแหน่ น้ำมันยูคาลิปตัส และโดดเด่นด้วยกลิ่นหอมเอกลักษณ์จากดอกกาสะลอง \nกลิ่นหอมแบบสุคนธบำบัด ช่วยบรรเทาอาการวิงเวียนศีรษะ คัดจมูก ลดความเครียด และเสริมคุณภาพการนอนหลับได้อย่างมีประสิทธิภาพ\n✔️ เหมาะสำหรับผู้ที่มีปัญหา ปวดศีรษะ ไมเกรน วิงเวียน คัดจมูกจากหวัด\n✔️ ให้ความรู้สึก สดชื่น ผ่อนคลาย เหมาะสำหรับผู้ที่มีปัญหา นอนไม่หลับหรืออ่อนเพลีย\n✔️ ใช้แต้มที่ขมับ ทาจุดที่ปวดเมื่อย หรือสูดดม เพื่อความรู้สึกผ่อนคลาย\n✔️ เนื้อสัมผัสเย็นสดชื่น จากสมุนไพรธรรมชาติ\n✔️ กลิ่นหอมละมุนของดอกกาสะลอง ให้ความรู้สึกสงบและผ่อนคลายอย่างเป็นธรรมชาติ\n✔️ บรรจุขนาดกะทัดรัด พกพาสะดวก ใช้ได้เป็นประจำทุกวัน\n✔️ ควบคุมการผลิตโดยเภสัชกรแพทย์แผนไทย\n\n\n\n🌿ส่วนประกอบสำคัญ\n\nดอกกาสะลอง\n ใช้ในภูมิปัญญาไทยเพื่อให้ความรู้สึกโล่งจมูกและผ่อนคลาย นิยมใช้ในตำรับยาสมุนไพรสำหรับดูแลระบบทางเดินหายใจ\nเกล็ดสะระแหน่\n มีคุณสมบัติให้กลิ่นหอมเย็น ช่วยให้รู้สึกสดชื่น และนิยมใช้ในตำรับยาดม ยาแก้ไอตามภูมิปัญญาไทย เพื่อบรรเทาความไม่สบายจากอาการคัดจมูก\nน้ำมันยูคาลิปตัส\n มีกลิ่นหอมเฉพาะตัว ให้ความรู้สึกโล่งจมูก นิยมใช้ในผลิตภัณฑ์สูดดมและน้ำมันนวด เพื่อผ่อนคลายจากความอ่อนล้า\nพิมเสน\n ใช้ภายนอกในตำรับยาสมุนไพรไทย ให้กลิ่นหอมเย็น รู้สึกสดชื่น นิยมใช้ในยาดมและยาทาภายนอกเพื่อความผ่อนคลาย\nการบูร\n มีคุณสมบัติให้กลิ่นหอมร้อน นิยมใช้ในยาทาถูนวดและยาดมในตำรับยาแผนไทย เพื่อบรรเทาอาการเมื่อยล้า และให้ความรู้สึกโล่งจมูก\n\n\n✅สรรพคุณ \nบรรเทาอาการคัดจมูก เนื่องจากหวัด แก้ลมวิงเวียน\n\n✅วิธีการใช้งาน \nสูดดม หรือทาบาง ๆ ตามคอ ขมับ และหน้าอกเมื่อมีอาการ\n\n\n✅ข้อแนะนำและการเก็บรักษา \nผลิตภัณฑ์สมุนไพรแท้จากธรรมชาติ กลิ่นและสีอาจเปลี่ยนแปลงตามฤดูกาล\nสำหรับใช้ภายนอกเท่านั้น ห้ามรับประทาน\nระวังไม่ให้ยาสัมผัสบริเวณที่เป็นแผลเปิด\nหากมีอาการแพ้ให้หยุดใช้แล้วปรึกษาแพทย์\nส่วนผสมทั้งหมดอ้างอิงจากภูมิปัญญาไทยที่ใช้มาอย่างยาวนาน\nเหมาะสำหรับการสูดดมหรือใช้ทาภายนอกเพื่อความผ่อนคลายจากกลิ่นหอมแนวสมุนไพร\nผลลัพธ์ขึ้นอยู่กับสภาพร่างกายและการตอบสนองของแต่ละบุคคล\n\n#หลับง่าย #สมุนไพรฟิวชั่น #พิมเสนคุณมี #คุณมี #Khunmee #             img.className = 'product-img';
            img.src = item.image;
            img.loading = 'lazy';
            img.onerror = function() { this.src = 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200'; };
            imgWrapper.appendChild(img);
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';
            const titleDiv = document.createElement('div');
            titleDiv.className = 'product-title';
            titleDiv.innerText = item.title;
            const descDiv = document.createElement('div');
            descDiv.className = 'product-desc';
            descDiv.innerText = item.description;
            const metaDiv = document.createElement('div');
            metaDiv.className = 'product-meta';
            metaDiv.innerText = 'หมวดหมู่: ' + item.category;
            
            infoDiv.appendChild(titleDiv);
            infoDiv.appendChild(descDiv);
            infoDiv.appendChild(metaDiv);
            
            const btnLink = document.createElement('a');
            btnLink.className = 'btn-shop';
            btnLink.href = item.link;
            btnLink.target = '_blank';
            btnLink.innerText = 'ไปที่ร้านค้า 🛍️';
            
            // เรียงลำดับส่วนประกอบใหม่เข้าการ์ด
            card.appendChild(badge);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            card.appendChild(btnLink);
            container.appendChild(card);
        });
    }
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        const filtered = products.filter(p => p.title.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));
        renderProducts(filtered);
    });
    renderProducts(products);
</script>
</body>
</html>
