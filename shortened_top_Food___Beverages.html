re anytime.\n\nวิธีการทำ\n1. ต้มน้ำ ประมาณ 600 มล. ให้เดือด ใส่เส้นราเมงต้มประมาณ 5 นาที\n2. เทน้ำออกให้เหลือไว้ประมาณ 8 ช้อนโต๊ะ (125 มล.)\n3. ใส่ผักอบแห้งคนให้เข้ากันและพร้อมรับประทาน\n\nHALAL มีเครื่องหมายฮาลาล\nFDA. 10-3-11523-5-1062\n\n", "image": "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&auto=format&fit=crop&q=60", "link": "https://shopee.co.th/universal-link/product/294954656/46056737412?affiliate_id=15380700000", "category": "Food   Beverages"}, {"title": "นมกล่อง เอส 26 ยูเอชที โกลด์โปร สูตร 3 (54 กล่อง) ยกลัง x2 S-26 Gold Pro UHT Formula3 x2 cases", "description": "S-26 UHT Gold Pro cases (54 boxes) เอส 26 นมกล่องยูเอชที โกลด์ โปร แพ็ค 3 x 9 2 ลัง (54 กล่อง)\nผลิตภัณฑ์นมยูเอชที เอส-26 โกลด์ โปร เครื่องหมายการค้า นมยูเอชที\n\nเหมาะสมสำหรับเด็กวัยเรียนรู้ อายุ 1 ปีขึ้นไปและสามารถดื่มได้ทั้งครอบครัว \n\nรสจืด\nส่วนประกอบที่สำคัญ\n\nแลคโตส 5.9%, นมผงพร่องมันเนย 3.75%, น้ำมันพืชผสม (น้ำมันข้าวโพด, น้ำมันเรพซีดที่มีกรดอีรูซิกต่ำ, น้ำมันปาล์มโอลีอิน) 2.8%, เวย์โปรตีนเข้มข้นที่มีแอลฟา-แล็คตัลบูมิน 1.68%, วิตามินและเกลือแร่รวม 0.38%, ไขมันนม 0.3%, น้ำมันปลาชนิดผงที่ให้ดีเอชเอ 0.14%, วัตถุเจือปนอาหาร (INS304, INS330, INS322(i), INS332(ii), INS500(ii), INS407, INS460(i), INS466, INS301, INS471, INS307b, มอลโทเดกซ์ทริน) แต่งกลิ่นเลียนธรรมชาติ (วานิลลา)\n\nข้อมูลสำหรับผู้แพ้อาหาร :\n\nมีนม เลซิทินจากถั่วเหลืองและผลิตภัณฑ์จากปลา อาจมีถั่วเหลือง\n\nอย. 13-202746-5-0034\n\nอายุการเก็บรักษา 9 เดือน\n\nวิธีการรับประทาน\n\n- สะดวกสบาย เพียงเขย่าให้เข้ากันแล้วใช้หลอดเจาะดื่มบริโภค \n\n- ควรเขย่าก่อนดื่มทุกครั้ง เพราะนมอาจตกตะกอนได้ ซึ่งเป็นธรรมชาติของนม ไม่ได้มีการสูญเสียคุณภาพหรือเป็นอันตรายแต่อย่างใด\n\n- ดื่มง่ายกว่าเพียงแช่เย็นให้พอดี ใครๆก็สามารถดื่มได้\n\nสิ่งที่ควรทราบ\n\n• เก็บในที่แห้งและเย็น (4-40๐C) และควรเก็บให้พ้นแสงแดด\n\n• ห้ามแช่แข็ง ห้ามโยน และห้ามแช่น้ำ\n\n• ควรบริโภคให้หมดภายใน 1 ชั่วโมงหลังจากเปิดกล่องแล้ว\n\n• อาจมีตะกอนที่เกิดขึ้นตามธรรมชาติ ไม่มีผลต่อคุณภาพของผลิตภัณฑ์\n\n• ควรดูแลเด็กเมื่อดื่มผลิตภัณฑ์เพียงลำพัง\n\n• เก็บพลาสติกหุ้มหลอดกระดาษให้พ้นมือเด็ก\n\n\nวิธีการเลือกนมกล่อง\n\n1. ดูรายละเอียดข้างบรรจุภัณฑ์ ควรบอกส่วนผสม วันที่ผลิต วันที่ควรบริโภคก่อน และรายละเอียดทุกอย่างยังชัดเจน\n\n2. ดูคุณประโยชน์ที่ฉลาก\n\nผลิตภัณฑ์นม สูตร 3 เพิ่มปริมาณจากสูตรเดิม ได้แก่ สฟิงโกไมอีลิน, ดีเอชเอ, แกงกลิโอไซด์ และวิตามินบี 12 ที่มีส่วนช่วยในการทำงานตามปกติของระบบประสาทและสมอง เหมาะสำหรับเด็กอายุ 1 ปีขึ้นไปและทุกคนในครอบครัว รสจืด กลิ่นวานิลลา \nเอส-26 ® โกลด์ 3™ (S-26 Gold Progress 3,500g Formula 3™) เครื่องหมายการค้า\n\nส่วนประกอบที่สำคัญ โดยประมาณ: \nแลคโตส 37.8%, นมผงขาดมันเนย 28%, น้ำมันพืชต่างๆ 12.6% (น้ำมันถั่วเหลือง, น้ำมันดอกทานตะวันที่มีกรดโอเลอิกสูง, น้ำมันปาล์ม), มอลโทเดกซ์ทริน 6.8%, เวย์โปรตีนเข้มข้น 5%, ใยอาหารชนิดโอลิโกฟรุคโตส 3.2%, วิตามินและเกลือแร่รวม 2.7%, เวย์โปรตีนเข้มข้นที่มีแอลฟา-แล็คตัลบูมิน 2.3%, น้ำมันปลาที่ให้ดีเอชเอ 0.22%, น้ำมันปลาชนิดผง 0.2%, 2’-ฟูโคซิลแลคโตส (2’-แอฟแอล) 0.16%, ทอรีน 0.04%, น้ำมันที่ให้เออาร์เอ 0.04%, นิวคลีโอไทด์รวม 0.02%, ลูทีน 0.0003%, อิมัลซิไฟเออร์ (INS322(i), INS471), สารควบคุมความเป็นกรด (INS330), สารป้องกันการเกิดออกซิเดชั่น (INS304, INS307b), สารช่วยพา (มอลโทเดกซ์ทริน), แต่งกลิ่นเลียนธรรมชาติ\nข้อมูลสำหรับผู้แพ้อาหาร : มีนม ผลิตภัณฑ์จากปลาและถั่วเหลือง\n\nวิธีเตรียมที่ผลิตภัณฑ์:\n1. ล้างมือและแก้วก่อนเตรียมผลิตภัณฑ์ \n2. ต้มน้ำให้เดือดและทิ้งไว้ให้อุ่น \n3. เทน้ำอุ่นลงในแก้วตามปริมาณที่แนะนำ คนให้ผลิตภัณฑ์ละลายจนหมด\n4. พับปากซองให้สนิทหลังใช้ทุกครั้ง \n5. เก็บช้อนและซองในภาชนะปิดสนิท ไว้ในที่แห้งและเย็น\n\n1 ช้อนตวง = 6 กรัม ผสมผลิตภัณฑ์ 7 ช้อนตวง ต่อน้ำต้มสุกอุ่น 210 มิลลิลิตร จะได้นม 1 แก้ว ปริมาณ 240 มิลลิลิตร\n\nการเก็บรักษา:\nทุกครั้งหลังการใช้ พับปากซองให้สนิท ใส่ในภาชนะที่มีฝาปิดสนิท และเก็บไว้ในที่แห้งและเย็น หลีกเลี่ยงการเก็บในที่อุณหภูมิร้อนจัด หรือเย็นจัดเป็นระยะเวลานาน ควรใช้ให้หมดภายใน 4 สัปดาห์ หลังจากเปิดซองแล้ว \n\nผลิตในประเทศสิงคโปร์\nนำเข้าโดย บริษัท เนสท์เล่ (ไทย) จำกัด 999/9 ถนนพระราม 1 แขวงปทุมวัน เขตปทุมวัน กรุงเทพฯ 10330\nผลิตโดย บริษัท ไวเอท นิวทริชั่นแนล สิงคโปร์ 1 ธาวส์ เซาท์ อเวนิว 4 สิงคโปร์ 637609 \nผลิตภัณฑ์นี้ได้ร ปุ๊ปแตกปั๊ป เข้าถึงรสผลไม้\n- การันตีความอร่อยด้วยรางวัล Superior Taste Award 3 ดาว ปี 2024\n- มีมาตรฐานปลอดภัย ผ่านการรับรองคุณภาพอาหารและยา\n\nมีให้เลือก 4 รสชาติ\n1.สตรอว์เบอร์รี่ (หมายเลขอย. 10-3-16665-5-0027)\n2.ลิ้นจี่ (หมายเลขอย. 10-3-16665-5-0028)\n3.แอปเปิ้ลเขียว (หมายเลขอย. 10-3-16665-5-0031)\n4.บลูเบอร์รี่ (หมายเลขอย. 10-3-16665-5-0032)\n\nส่วนประกอบที่สำคัญ\n- น้ำ\n- ฟรุกโตส\n- วัตถุเจือปนอาหาร\n- สารควบคุมความเป็นกรด (INS330, INS296)\n- สารให้ความข้นเหนียว (INS1420, INS401, INS415, INS509)\n- วัตถุแต่งกลิ่นรส (INS327, INS509)\n- วัตถุให้ความหวานแทนน้ำตาล (ซูคราโลส)\n- สารกันเสีย (INS202)\n- แต่งสีและกลิ่นเลียนธรรมชาติ\n\nบรรจุ : 130 กรัม/กระปุก วิธีการใช้\n\nวิธีการใช้งาน\n- ใช้เป็นท็อปปิ้งตกแต่งเครื่องดื่มประเภทโซดา สมูทตี้ ม็อกเทล ค็อกเทลและของหวานต่างๆ โยเกิร์ต บิงซู พุดดิ้ง\n\nเมนูแนะนำ\nสตรอว์เบอร์รี่โซดา\nอัตราส่วน\n1.ไซรัปสตรอว์เบอร์รี่โซดา 30 ml\n2.น้ำเชื่อม 10 ml\n3.น้ำเปล่า 25 ml\n4.โซดา 100 ml\n5.ไข่มุกป๊อปตามชอบ\n6.น้ำแข็ง\nวิธีทำ\n1.ผสมไซรัปสตรอว์เบอร์รี่ น้ำเชื่อมและน้ำเปล่า คนให้เข้ากัน\n2.ใส่น้ำแข็ง ตามด้วยโซดา\n3.ท็อปปิ้งด้วยไข่มุกป๊อป เรนโบว์ป๊อปปิ้ง ตรา ทีอีเอตามชอบ พร้อมเสิร์ฟ\n\nบลูเบอร์รี่สมูทตี้โยเกิร์ต\nอัตราส่วน\n1.โยเกิร์ตรสธรรมชาติ 1/2 ถ้วย\n2.นมสด 120 ml\n3.บลูเบอร์รี่ 1 กล่อง (หรือประมาณ 100g)\n4.น้ำผึ้ง 15 ml\n5.น้ำแข็ง\nวิธีทำ\n1.ผสมโยเกิร์ต นมสด บลูเบอร์รี่ น้ำผึ้ง และน้ำแข็งลงในเครื่องปั่น ปั่นจนเนื้อละเอียด\n2.เทใส่แก้ว แล้วท็อปปิ้งด้วยไข่มุกป๊อป เรนโบว์ป๊อปปิ้ง ตรา ทีอีเอตามชอบ\n3.พร้อมเสิร์ฟ\n\nแอเปิ้ลเขียวโซดาปั่น (Blue Ocean Soda Smoothie)\nอัตราส่วน\n1.ไซรัปแอเปิ้ลเขียว 20 ml\n2.น้ำเลมอน 30 ml\n3.โซดา 80 ml\n4.น้ำแข็ง\nวิธีทำ\n1.ผสมไซรัปแอเปิ้ลเขียว น้ำเลมอน โซดา และน้ำแข็ง ลงในเครื่องปั่น ปั่นจนเนื้อละเอียด\n2.เทใส่แก้ว ท็อปปิ้งด้วยไข่มุกป๊อป เรนโบว์ป๊อปปิ้ง ตรา ทีอีเอตามชอบ\n3.พร้อมเสิร์ฟ\n\nอายุการจัดเก็บ\n12 เดือนนับจากวันที่ผลิต (ดูที่ใต้บรรจุภัณฑ์)\n\nวิธีการเก็บรักษา\n- ควรเก็บในที่อากาศถ่ายเทสะดวก อุณหภูมิห้องปกติ ไม่โดนแสงแดดโดยตรง และหลีกเลี่ยงความร้อนสูง เพื่อคงรสชาติและเนื้อสัมผัสของท็อปปิ้ง\n- หากเปิดใ     // เติมระบบจำเลขดั้งเดิมไว้เพื่อรันลำดับตอนค้นหาเรียลไทม์
    products.forEach((p, index) => {
        p.originalIndex = index + 1;
    });

    function renderProducts(items) {
        const container = document.getElementById('productList');
        const noResults = document.getElementById('noResults');
        const statsText = document.getElementById('statsText');
        container.innerHTML = '';
        if (items.length === 0) {
            noResults.style.display = 'block';
            statsText.innerText = 'พบสินค้า 0 รายการ';
            return;
        }
        noResults.style.display = 'none';
        statsText.innerText = '✨ เจอดีลทั้งหมด ' + items.length + ' รายการ พร้อมเสิร์ฟ!';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            // 1. เพิ่มกล่องเลขลำดับสินค้าอันเด่นชัด
            const badge = document.createElement('div');
            badge.className = 'product-badge';
            badge.innerText = '#' + item.originalIndex;
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'product-img-wrapper';
            const img = document.createElement('img');
            img.className = 'product-img';
            img.src = item.image;
            img.loading = 'lazy';
            img.onerror = function() { this.src = 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200'; };
            imgWrapper.appendChild(img);
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'product-info';
            const titleDiv = document.createElement('div');
            titleDiv.className = 'product-title';
            titleDiv.innerText = item.title;
            const descDiv = document.createElement('div');
            descDiv.className = 'product-desc';
            descDiv.innerText = item.description;
            const metaDiv = document.createElement('div');
            metaDiv.className = 'product-meta';
            metaDiv.innerText = 'หมวดหมู่: ' + item.category;
            
            infoDiv.appendChild(titleDiv);
            infoDiv.appendChild(descDiv);
            infoDiv.appendChild(metaDiv);
            
            const btnLink = document.createElement('a');
            btnLink.className = 'btn-shop';
            btnLink.href = item.link;
            btnLink.target = '_blank';
            btnLink.innerText = 'ไปที่ร้านค้า 🛍️';
            
            // เรียงลำดับส่วนประกอบใหม่เข้าการ์ด
            card.appendChild(badge);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            card.appendChild(btnLink);

        });
    }

    });
